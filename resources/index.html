  <script>
    firebase.initializeApp({
      apiKey   : '',
      projectId: ''
    });

    function getCount(doc, increaseCount) {
      // IncreaseCount will be false when not in article page
      return doc.get().then(d => {
        var count = 0;
        if (!d.exists) { // Has no data, initialize count
          if (increaseCount) {
            doc.set({
              count: 1
            });
            count = 1;
          }
        } else { // Has data
          count = d.data().count;
          if (increaseCount) {
            // If first view this article
            doc.set({ // Increase count
              count: count + 1
            });
            count++;
          }
        }

        return count;
      });
    }

    function appendCountTo(el) {
      return count => {
        el.innerText = count;
      }
    }
  </script>

<script>
(function(){
  // 已经看过就不显示
  if (sessionStorage.getItem('splash_done')) return;

  // 创建遮罩
  var mask = document.createElement('div');
  mask.id = 'splash-mask';
  mask.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:#000;cursor:pointer;';

  // 创建视频（不带muted，允许声音）
  var video = document.createElement('video');
  video.src = '/videos/intro.mp4';
  video.autoplay = true;
  video.playsInline = true;
  video.preload = 'auto';
  video.style.cssText = 'width:100%;height:100%;object-fit:cover;';

  // 跳过提示
  var hint = document.createElement('span');
  hint.textContent = '点击跳过 →';
  hint.style.cssText = 'position:fixed;bottom:24px;right:24px;color:rgba(255,255,255,0.5);font-size:13px;z-index:2147483648;pointer-events:none;';

  mask.appendChild(video);
  document.body.appendChild(mask);
  document.body.appendChild(hint);

  // 关闭函数
  function closeSplash(){
    if (!mask.parentNode) return;
    mask.style.transition = 'opacity 0.5s ease';
    mask.style.opacity = '0';
    hint.style.transition = 'opacity 0.5s ease';
    hint.style.opacity = '0';
    setTimeout(function(){
      if (mask.parentNode) mask.parentNode.removeChild(mask);
      if (hint.parentNode) hint.parentNode.removeChild(hint);
      sessionStorage.setItem('splash_done', '1');
    }, 500);
  }

  // 点击遮罩关闭
  mask.onclick = closeSplash;

  // 视频播完自动关闭
  video.addEventListener('ended', closeSplash);

  // 兜底：8秒强制关闭（防止视频卡住）
  setTimeout(closeSplash, 8000);

  // 视频加载失败也关闭
  video.addEventListener('error', closeSplash);
})();
</script>
